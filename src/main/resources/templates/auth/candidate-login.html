<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Candidate Login')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Login Card Container -->
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <div class="bg-primary text-white d-inline-flex p-3 rounded-circle mb-3 shadow">
                                <i class="bi bi-person fs-2"></i>
                            </div>
                            <h3 class="fw-bold">Candidate Login</h3>
                            <p class="text-muted small">Access your recruitment dashboard & applications</p>
                        </div>

                        <!-- Error Alert -->
                        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid email or password.
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <!-- Logout Success Alert -->
                        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i> Logged out successfully.
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <!-- Login Form -->
                        <form method="post" th:action="@{/login}">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" name="username" class="form-control border-start-0 ps-0" placeholder="name@example.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                                </div>
                            </div>

                            <button class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm mb-3">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small mb-1">New candidate? <a th:href="@{/candidate/register}" class="text-primary fw-bold text-decoration-none">Create an Account</a></p>
                            <p class="text-muted small">Are you a recruiter? <a th:href="@{/recruiter/login}" class="text-dark fw-bold text-decoration-none">Recruiter Portal</a></p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
