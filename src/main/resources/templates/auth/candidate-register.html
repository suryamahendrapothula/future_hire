<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Candidate Registration')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Registration Container -->
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <div class="bg-success text-white d-inline-flex p-3 rounded-circle mb-3 shadow">
                                <i class="bi bi-person-plus fs-2"></i>
                            </div>
                            <h3 class="fw-bold">Candidate Registration</h3>
                            <p class="text-muted small">Join FutureHire & find your dream job powered by AI</p>
                        </div>

                        <!-- Registration Form -->
                        <form th:action="@{/candidate/register}" th:object="${registerRequest}" method="post">
                            
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                                    <input type="text" th:field="*{fullName}" class="form-control border-start-0 ps-0" placeholder="John Doe" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" th:field="*{email}" class="form-control border-start-0 ps-0" placeholder="john.doe@example.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" th:field="*{password}" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                                </div>
                            </div>

                            <button class="btn btn-success btn-lg w-100 rounded-pill shadow-sm mb-3">
                                <i class="bi bi-person-plus-fill me-1"></i> Register Now
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small mb-1">Already have an account? <a th:href="@{/candidate/login}" class="text-primary fw-bold text-decoration-none">Sign In</a></p>
                            <p class="text-muted small">Register as a Recruiter? <a th:href="@{/recruiter/register}" class="text-dark fw-bold text-decoration-none text-opacity-75">Recruiter Register</a></p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
