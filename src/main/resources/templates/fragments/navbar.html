<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3" th:fragment="navbar">
        <div class="container">
            <a class="navbar-brand fw-extrabold text-primary d-flex align-items-center gap-2" th:href="@{/}">
                <i class="bi bi-cpu-fill fs-3"></i>
                <span>FutureHire</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2 mt-3 mt-lg-0">

                    <!-- Guest Navbar -->
                    <th:block sec:authorize="isAnonymous()">
                        <li class="nav-item">
                            <a class="nav-link px-3" th:href="@{/}">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="#about">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="#contact">Contact</a>
                        </li>
                        <li class="nav-item dropdown ms-lg-2">
                            <a class="btn btn-outline-primary dropdown-toggle px-4" href="#" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Login / Register
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-2">
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/candidate/login}">
                                        <i class="bi bi-person me-2 text-primary"></i> Candidate Login
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/candidate/register}">
                                        <i class="bi bi-person-plus me-2 text-success"></i> Candidate Register
                                    </a>
                                </li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/recruiter/login}">
                                        <i class="bi bi-building me-2 text-dark"></i> Recruiter Login
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item py-2" th:href="@{/recruiter/register}">
                                        <i class="bi bi-building-add me-2 text-secondary"></i> Recruiter Register
                                    </a>
                                </li>
                            </ul>
                        </li>
                    </th:block>

                    <!-- Candidate Navbar -->
                    <th:block sec:authorize="hasRole('CANDIDATE')">
                        <li class="nav-item">
                            <a class="nav-link px-3" th:href="@{/candidate/dashboard}">
                                <i class="bi bi-speedometer2 me-1"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" th:href="@{/candidate/applications}">
                                <i class="bi bi-briefcase me-1"></i> My Applications
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" th:href="@{/candidate/profile}">
                                <i class="bi bi-person-circle me-1"></i> Profile
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" th:href="@{/candidate/resume}">
                                <i class="bi bi-file-earmark-arrow-up me-1"></i> Upload Resume
                            </a>
                        </li>
                        <li class="nav-item ms-lg-3">
                            <div class="d-flex align-items-center gap-3">
                                <span
                                    class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 rounded-pill">
                                    <i class="bi bi-person-fill me-1"></i> Candidate
                                </span>
                                <form th:action="@{/logout}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-danger btn-sm px-3 rounded-pill">
                                        <i class="bi bi-box-arrow-right"></i> Logout
                                    </button>
                                </form>
                            </div>
                        </li>
                    </th:block>

                    <!-- Recruiter Navbar -->
                    <th:block sec:authorize="hasRole('RECRUITER')">
                        <li class="nav-item">
                            <a class="nav-link px-3" th:href="@{/recruiter/dashboard}">
                                <i class="bi bi-speedometer2 me-1"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" th:href="@{/recruiter/jobs}">
                                <i class="bi bi-list-task me-1"></i> Manage Jobs
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" th:href="@{/recruiter/jobs/new}">
                                <i class="bi bi-plus-circle me-1"></i> Post a Job
                            </a>
                        </li>
                        <li class="nav-item ms-lg-3">
                            <div class="d-flex align-items-center gap-3">
                                <span
                                    class="badge bg-dark-subtle text-dark border border-dark-subtle px-3 py-2 rounded-pill">
                                    <i class="bi bi-briefcase-fill me-1"></i> Recruiter
                                </span>
                                <form th:action="@{/logout}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-danger btn-sm px-3 rounded-pill">
                                        <i class="bi bi-box-arrow-right"></i> Logout
                                    </button>
                                </form>
                            </div>
                        </li>
                    </th:block>

                </ul>
            </div>
        </div>
    </nav>
</body>

</html>
